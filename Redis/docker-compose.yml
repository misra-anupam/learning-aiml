version: '3.8'
services:
  redis:
    image: redis:8.2-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - redis-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "8001:8001"
    environment:
      - RI_APP_PORT=8001
      - RI_APP_HOST=0.0.0.0
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - redis-net
volumes:
  redis-data:
    driver: local
networks:
  redis-net:
    driver: bridge
